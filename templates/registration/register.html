{% extends "base.html" %}
{% load static crispy_forms_tags %}

{% block title %}Registrarse — Superlista{% endblock title %}

{% block content %}
<div class="row justify-content-center mt-4">
    <div class="col-11 col-sm-9 col-md-7 col-lg-5 col-xl-4">
        <div class="card shadow-sm border-0">
            <div class="card-body p-4">
                <div class="text-center mb-4">
                    <i class="bi bi-person-plus-fill display-4 text-primary"></i>
                    <h2 class="mt-2 fw-bold">Crear cuenta</h2>
                    <p class="text-muted">Regístrate para empezar a usar Superlista</p>
                </div>

                <form method="post" novalidate>
                    {% csrf_token %}
                    {{ form|crispy }}

                    <div class="d-grid gap-2 mt-4">
                        <button type="submit" class="btn btn-success btn-lg">
                            <i class="bi bi-person-check"></i> Crear cuenta
                        </button>
                    </div>
                </form>

                <div class="text-center mt-3">
                    <p class="mb-0">
                        ¿Ya tienes cuenta?
                        <a href="{% url 'login' %}" class="text-decoration-none fw-semibold">
                            Inicia sesión
                        </a>
                    </p>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock content %}
